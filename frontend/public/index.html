<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垂直领域智能翻译 Agent</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --bg-container: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --focus-ring: rgba(79, 70, 229, 0.2);
            --btn-red: #ef4444;
            --btn-red-hover: #dc2626;
            --btn-purple: #8b5cf6;
            --btn-purple-hover: #7c3aed;
            --btn-dark: #334155;
            --btn-dark-hover: #1e293b;
            --btn-green: #10b981;
            --btn-green-hover: #059669;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }
        
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--bg-container); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01); 
        }

        h1 { 
            margin-top: 0; 
            color: #0f172a; 
            font-size: 1.75rem; 
            font-weight: 700;
            margin-bottom: 5px;
        }

        p {
            color: var(--text-light);
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        textarea, input[type="text"] { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 15px;
            box-sizing: border-box;
            background-color: #FAFAFA;
            transition: all 0.2s ease;
        }
        
        textarea {
            height: 110px; 
            resize: vertical; 
            margin-bottom: 15px; 
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        input[type="file"] {
            display: block;
            margin-bottom: 15px;
            font-size: 14px;
            color: var(--text-light);
        }

        input[type="file"]::file-selector-button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 10px;
            color: var(--text-main);
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #e2e8f0;
        }

        button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            font-size: 15px; 
            font-weight: 500;
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled { 
            background-color: #94a3b8; 
            cursor: not-allowed; 
            transform: none;
        }

        .btn-red { background-color: var(--btn-red); }
        .btn-red:hover { background-color: var(--btn-red-hover); }
        
        .btn-purple { background-color: var(--btn-purple); }
        .btn-purple:hover { background-color: var(--btn-purple-hover); }
        
        .btn-dark { background-color: var(--btn-dark); }
        .btn-dark:hover { background-color: var(--btn-dark-hover); }
        
        .btn-green { background-color: var(--btn-green); }
        .btn-green:hover { background-color: var(--btn-green-hover); }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 5px;
        }

        hr {
            margin: 30px 0; 
            border: 0; 
            border-top: 1px solid #e2e8f0;
        }

        .checkbox-label {
            display: flex; 
            align-items: flex-start;
            gap: 8px; 
            font-size: 14px; 
            color: var(--text-main);
            margin-bottom: 8px;
            cursor: pointer;
        }

        .checkbox-label.secondary {
            color: var(--text-light);
            font-size: 13px;
            margin-left: 24px;
        }

        .checkbox-label input[type="checkbox"] {
            margin-top: 3px;
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .status-box {
            margin: 10px 0 15px; 
            padding: 12px 15px; 
            font-size: 13px; 
            color: var(--text-light); 
            background: var(--bg-color); 
            border: 1px solid var(--border-color);
            border-radius: 6px; 
            line-height: 1.5;
        }

        .status-text {
            font-size: 14px;
            color: var(--text-light);
            margin-left: 5px;
        }

        .result-label { margin-top: 25px; font-size: 14px; color: var(--text-light); font-weight: 500; }
        
        .result-box { 
            margin-top: 8px; 
            padding: 20px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            background-color: #fff; 
            min-height: 120px; 
            white-space: pre-wrap; 
            font-size: 15px; 
            line-height: 1.6;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
        }
        
        .thought-box { 
            margin-top: 12px; 
            padding: 15px; 
            border: 1px dashed var(--border-color); 
            border-radius: 8px; 
            background-color: #f8fafc; 
            white-space: pre-wrap; 
            line-height: 1.5; 
            font-size: 14px;
            color: #64748b;
        }
        
        .translation { color: #0f172a; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 智能领域翻译 Agent</h1>
        
        <p>输入需要翻译的外语：</p>
        <textarea id="inputText" placeholder="例如：このゲームのデバフがエグい..."></textarea>
        <button id="translateBtn" onclick="startTranslation()">开始翻译</button>

        <hr>

        <p>▶️ 或者粘贴 YouTube 链接，自动抓取字幕并翻译：</p>
        <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..." style="margin-bottom: 12px;">

        <div class="btn-row">
            <button id="youtubeBtn" onclick="startYoutubeTranslation()" class="btn-red">页面预览翻译</button>
            <button id="youtubeSrtBtn" onclick="downloadYoutubeSrt()" class="btn-purple">下载翻译字幕 (SRT)</button>
            <button id="youtubeVideoBtn" onclick="downloadYoutubeVideo()" class="btn-dark">下载原视频 (可选)</button>
        </div>
        <div>
            <span id="youtubeSrtStatus" class="status-text"></span>
            <span id="youtubeVideoStatus" class="status-text"></span>
        </div>

        <hr>

        <p>📁 或者批量翻译文件 (支持 .txt / .srt):</p>
        <input type="file" id="fileInput" accept=".txt,.srt">
        <div class="btn-row">
            <button id="fileTranslateBtn" onclick="startFileTranslation()" class="btn-green">上传并翻译文件</button>
            <span id="fileStatus" class="status-text"></span>
        </div>

        <hr>

        <label class="checkbox-label" style="margin-top: 5px;">
            <input type="checkbox" id="showThoughts" onchange="toggleThoughts()">
            显示 Agent 思考过程（ReAct 推理 / 工具调用 / RAG 检索）
        </label>

        <div id="thoughtBox" class="thought-box hidden"></div>

        <div class="result-label">译文</div>
        <div id="resultBox" class="result-box">等候输入...</div>
    </div>

    <script>
        // 思考过程开关：默认隐藏，只显示干净译文
        function toggleThoughts() {
            const show = document.getElementById('showThoughts').checked;
            document.getElementById('thoughtBox').classList.toggle('hidden', !show);
        }

        // 通用：消费一个 SSE 流，思考过程与译文分开渲染
        function consumeStream(sseUrl, btn, options) {
            options = options || {};
            const resultBox = document.getElementById('resultBox');
            const thoughtBox = document.getElementById('thoughtBox');
            btn.disabled = true;
            if (!options.keepResult) {
                resultBox.textContent = '';
            }
            thoughtBox.textContent = '';

            const eventSource = new EventSource(sseUrl);

            eventSource.onmessage = function(event) {
                if (event.data === "[DONE]") {
                    eventSource.close();
                    btn.disabled = false;
                    if (options.onDone) options.onDone();
                    if (!options.keepResult && !resultBox.textContent.trim()) {
                        resultBox.textContent = '（本次没有产生译文，可勾选上方开关查看 Agent 思考过程了解原因）';
                    }
                    return;
                }
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'thought') {
                        const span = document.createElement('span');
                        span.textContent = data.content;
                        thoughtBox.appendChild(span);
                    } else if (data.type === 'token') {
                        const span = document.createElement('span');
                        span.className = 'translation';
                        span.textContent = data.content;
                        resultBox.appendChild(span);
                    } else if (data.type === 'progress' && options.onProgress) {
                        options.onProgress(data);
                    } else if (data.type === 'srt' && options.onSrt) {
                        options.onSrt(data);
                    }
                } catch (e) {
                    console.error("解析流式数据出错", e, event.data);
                }
            };

            eventSource.onerror = function(err) {
                console.error("SSE Error:", err);
                eventSource.close();
                btn.disabled = false;
                if (options.onError) {
                    options.onError(err);
                } else {
                    resultBox.innerHTML += '\n<span style="color:red">[连接中断或出错]</span>';
                }
            };
        }

        async function startTranslation() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) return;
            const btn = document.getElementById('translateBtn');
            consumeStream(`/api/translate?text=${encodeURIComponent(text)}`, btn);
        }

        // 模式一：页面流式预览（不带时间轴，边翻边看）
        async function startYoutubeTranslation() {
            const url = document.getElementById('youtubeUrl').value.trim();
            if (!url) {
                alert("请先粘贴一个 YouTube 链接！");
                return;
            }
            const btn = document.getElementById('youtubeBtn');
            consumeStream(`/api/translate-youtube?url=${encodeURIComponent(url)}`, btn);
        }

        // 模式二：下载带时间轴的翻译 SRT（流式进度 + 可选 Agent 思考过程）
        async function downloadYoutubeSrt() {
            const url = document.getElementById('youtubeUrl').value.trim();
            if (!url) {
                alert("请先粘贴一个 YouTube 链接！");
                return;
            }
            const btn = document.getElementById('youtubeSrtBtn');
            const status = document.getElementById('youtubeSrtStatus');
            const resultBox = document.getElementById('resultBox');

            status.textContent = "准备中…";
            resultBox.textContent = "正在生成 SRT 字幕，请稍候…\n";

            consumeStream(`/api/translate-youtube-srt?url=${encodeURIComponent(url)}`, btn, {
                keepResult: true,
                onProgress: function(data) {
                    const msg = data.message || (`${data.done}/${data.total}`);
                    status.textContent = msg;
                    resultBox.textContent = "【SRT 导出中】\n" + msg + "\n\n（勾选上方开关可查看 Agent 思考过程）";
                },
                onSrt: function(data) {
                    const blob = new Blob([data.content], { type: 'application/x-subrip;charset=utf-8' });
                    const dlUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = dlUrl;
                    a.download = data.filename || 'translated.srt';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(dlUrl);
                    status.textContent = "✅ 已生成并下载 " + (data.filename || 'translated.srt');
                    resultBox.textContent = "【SRT 导出完成】\n已下载：" + (data.filename || 'translated.srt');
                },
                onError: function() {
                    status.textContent = "❌ 连接中断或出错";
                    resultBox.textContent += "\n[连接中断或出错]";
                },
                onDone: function() {
                    if (status.textContent.indexOf('✅') !== 0 && status.textContent.indexOf('❌') !== 0) {
                        status.textContent = "已完成（若未自动下载，请查看思考过程了解原因）";
                    }
                }
            });
        }

        function _filenameFromContentDisposition(cd) {
            if (!cd) return '';
            // filename*=utf-8''xxx
            const mStar = cd.match(/filename\*\s*=\s*utf-8''([^;]+)/i);
            if (mStar && mStar[1]) {
                try { return decodeURIComponent(mStar[1]); } catch { return mStar[1]; }
            }
            const m = cd.match(/filename\s*=\s*\"?([^\";]+)\"?/i);
            return (m && m[1]) ? m[1] : '';
        }

        // 可选：下载 YouTube 原视频（后端默认关闭，需 .env 开关）
        async function downloadYoutubeVideo() {
            const url = document.getElementById('youtubeUrl').value.trim();
            if (!url) {
                alert("请先粘贴一个 YouTube 链接！");
                return;
            }
            const btn = document.getElementById('youtubeVideoBtn');
            const status = document.getElementById('youtubeVideoStatus');
            status.textContent = "准备下载…（大文件可能较慢）";
            btn.disabled = true;
            try {
                const res = await fetch(`/api/download-youtube-video?url=${encodeURIComponent(url)}`);
                if (!res.ok) {
                    const text = await res.text().catch(() => '');
                    status.textContent = "❌ 下载失败";
                    alert((text && text.trim()) ? text : `下载失败：HTTP ${res.status}`);
                    return;
                }
                const cd = res.headers.get('content-disposition') || '';
                const filename = _filenameFromContentDisposition(cd) || 'youtube_video.bin';
                const blob = await res.blob();
                const dlUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = dlUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(dlUrl);
                status.textContent = "✅ 已开始下载：" + filename;
            } catch (e) {
                status.textContent = "❌ 下载失败";
                alert("下载失败：" + (e && e.message ? e.message : String(e)));
            } finally {
                btn.disabled = false;
            }
        }

        async function startFileTranslation() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert("请先选择一个文件！");
                return;
            }

            const file = fileInput.files[0];
            const btn = document.getElementById('fileTranslateBtn');
            const statusLabel = document.getElementById('fileStatus');
            
            btn.disabled = true;
            statusLabel.textContent = "翻译中，请稍候（可能需要几十秒）...";

            const formData = new FormData();
            formData.append("file", file);

            try {
                // 发送到 Node.js 的代理路由
                const response = await fetch('/api/translate-srt', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    throw new Error("翻译失败，状态码: " + response.status);
                }

                // 作为文件触发下载
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "translated_" + file.name;
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                statusLabel.textContent = "✅ 翻译完成并已下载！";
            } catch (e) {
                console.error(e);
                statusLabel.textContent = "❌ " + e.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
